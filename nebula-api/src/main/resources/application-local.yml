server:
  port: 1010

spring:
  application:
    name: nebula-api

  datasource:
    url: jdbc:postgresql://localhost:5432/nebula
    username: nebula
    password: nebula
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

# JWT Configuration
nebula:
  jwt:
    secret: local-development-secret-key-32chars
    expiration-ms: 86400000
  app:
    base-url: http://localhost:3000

# Stripe Configuration (optional for local dev)
stripe:
  api:
    secret-key: 
  webhook:
    secret: 
  prices:
    starter: 
    pro: 

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.nebula: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
