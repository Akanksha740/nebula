server:
  port: 1010

spring:
  application:
    name: nebula-api

  datasource:
    url: jdbc:postgresql://localhost:5432/nebula
    username: nebula
    password: ${DB_PASSWORD:nebula}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

# Google OAuth
google:
  client-id: 721172836983-nstas6fkmqgqs2jrrdkgh2ldi9m116ui.apps.googleusercontent.com

# JWT Configuration
nebula:
  jwt:
    secret: local-development-secret-key-32chars
    expiration-ms: 86400000
  app:
    base-url: http://localhost:3000

# Resend Configuration
resend:
  api:
    key: ${RESEND_API_KEY:re_4kPvbekH_ALoVvRxpW3aQVrVU9nV6KKoL}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

# Dodo Payments Configuration
dodo:
  api:
    key: eyfQ8Ui7wZ8XI3MM.ZDuIPY7h9Z1JZfjQVaoiRhdKEM0AMLUTxILQLUgvmfkmanYT
    base-url: https://test.dodopayments.com
  webhook:
    secret: dodo-local-secret
  products:
    pro: pdt_0NbNc25MioqkvyPw8qbhw

# NOWPayments Crypto Configuration
nowpayments:
  api-key: ${NOWPAYMENTS_API_KEY:}
  email: ${NOWPAYMENTS_EMAIL:}
  password: ${NOWPAYMENTS_PASSWORD:}
  ipn-secret: ${NOWPAYMENTS_IPN_SECRET:}
  webhook-url: http://localhost:1010/v1/webhook/nowpayments
  pro-amount: "22"
  pro-currency: usd
  pro-plan-id: ${NOWPAYMENTS_PRO_PLAN_ID:}
  pro-interval-days: 60

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.nebula: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
