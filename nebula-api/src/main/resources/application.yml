server:
  port: 1010

spring:
  application:
    name: nebula-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nebula}
    username: ${DB_USERNAME:nebula}
    password: ${DB_PASSWORD:nebula}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Google OAuth
google:
  client-id: ${GOOGLE_CLIENT_ID:}

# JWT Configuration
nebula:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
    expiration-ms: 86400000  # 24 hours
  cookie:
    secure: ${COOKIE_SECURE:true}
    domain: ${COOKIE_DOMAIN:}
  app:
    base-url: ${APP_BASE_URL:http://localhost:3000}
  email-verification:
    token-expiry-hours: 24

# Resend Configuration (Email)
resend:
  api:
    key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:noreply@yourdomain.com}

# NOWPayments Crypto Configuration
nowpayments:
  api-key: ${NOWPAYMENTS_API_KEY:}
  ipn-secret: ${NOWPAYMENTS_IPN_SECRET:}
  webhook-url: ${NOWPAYMENTS_WEBHOOK_URL:}
  pro-amount: "20"
  pro-currency: usd

# Dodo Payments Configuration
dodo:
  api:
    key: ${DODO_API_KEY:}
    base-url: ${DODO_API_BASE_URL:https://test.dodopayments.com}
  webhook:
    secret: ${DODO_WEBHOOK_SECRET:}
  products:
    pro: ${DODO_PRODUCT_PRO:}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.nebula: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss.SSS"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
