server:
  port: 8080

spring:
  application:
    name: nebula-api

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:nebula}
    username: ${DB_USERNAME:nebula}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Google OAuth
google:
  client-id: 721172836983-nstas6fkmqgqs2jrrdkgh2ldi9m116ui.apps.googleusercontent.com

nebula:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 hours
  app:
    base-url: ${APP_BASE_URL}

