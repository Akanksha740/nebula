server:
  port: 8081

spring:
  application:
    name: nebula-ingestion

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:nebula}
    username: ${DB_USERNAME:nebula}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

polymarket:
  api:
    base-url: https://gamma-api.polymarket.com
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
    write-timeout-ms: 30000
    retry-attempts: 3
    retry-delay-ms: 1000
  clob:
    base-url: https://clob.polymarket.com

nebula:
  snapshot:
    interval-ms: ${SNAPSHOT_INTERVAL_MS:1000}
    long-interval-ms: ${SNAPSHOT_LONG_INTERVAL_MS:1000}
    log-each-tick: false
  retention:
    days: 30
    cleanup-cron: "0 0 2 * * ?"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.nebula: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss.SSS Z,Asia/Kolkata"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS Z, Asia/Kolkata} %-5level [%thread] %logger{36} - %msg%n"