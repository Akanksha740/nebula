server:
  port: 8081

spring:
  application:
    name: nebula-ingestion
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nebula}
    username: ${DB_USERNAME:nebula}
    password: ${DB_PASSWORD:nebula}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Polymarket API configuration
polymarket:
  api:
    base-url: https://gamma-api.polymarket.com
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
    write-timeout-ms: 30000
    retry-attempts: 3
    retry-delay-ms: 1000
  clob:
    base-url: https://clob.polymarket.com

# Polybacktest backup API (one-shot historical snapshot backfill)
polybacktest:
  api:
    base-url: https://api.polybacktest.com
    api-key: ${POLYBACKTEST_API_KEY:pdm_rAHYjBmpLT7UvyFVglXOem2tb68FKdiV}
    rate-limit-rpm: 300       # 300 requests per minute = 200 ms spacing
    page-size: 1000
    retry-attempts: 3
    retry-delay-ms: 1000
  backup:
    # Auto-fires the backfill on app startup. Override per-deploy with
    # BACKUP_RUN_ON_STARTUP=false if you do not want it to run.
    run-on-startup: ${BACKUP_RUN_ON_STARTUP:true}
    coin-prefix: btc
    interval: 5m
    coin: BTC
    start-epoch: 1778320800
    end-epoch: 1775645914
    step-seconds: 300
    max-iterations: 10000
    max-consecutive-missing: 500

# Binance API configuration
binance:
  api:
    base-url: https://api.binance.com

# Nebula configuration
nebula:
  api-key: ${INGESTION_API_KEY:changeme}
  snapshot:
    interval-ms: ${SNAPSHOT_INTERVAL_MS:1000}  # Short markets (5m, 15m, 1hr)
    long-interval-ms: ${SNAPSHOT_LONG_INTERVAL_MS:1000}  # Long markets (4h, 24h): 1 per second
    log-each-tick: ${SNAPSHOT_LOG_TICK:false}
  retention:
    days: ${RETENTION_DAYS:31}
    cleanup-cron: ${RETENTION_CLEANUP_CRON:0 0 10 * * *}  # 10:00 AM daily
    cleanup-zone: ${RETENTION_CLEANUP_ZONE:Asia/Kolkata}   # IST
    vacuum: ${RETENTION_VACUUM:true}                      # run VACUUM ANALYZE after delete
    vacuum-full: ${RETENTION_VACUUM_FULL:false}           # locks tables — only in maintenance windows

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.nebula: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss.SSS Z,Asia/Kolkata"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS Z, Asia/Kolkata} %-5level [%thread] %logger{36} - %msg%n"
