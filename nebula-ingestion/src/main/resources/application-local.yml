server:
  port: 8081

spring:
  application:
    name: nebula-ingestion
  
  datasource:
    url: jdbc:postgresql://localhost:5432/nebula
    username: nebula
    password: nebula
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

# Polymarket API configuration
polymarket:
  api:
    base-url: https://gamma-api.polymarket.com
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
    write-timeout-ms: 30000
    retry-attempts: 3
    retry-delay-ms: 1000

# Polybacktest backup API (one-shot historical snapshot backfill)
polybacktest:
  api:
    base-url: https://api.polybacktest.com
    api-key: pdm_rAHYjBmpLT7UvyFVglXOem2tb68FKdiV
    rate-limit-rpm: 300       # 300 requests per minute
    page-size: 1000
    retry-attempts: 3
    retry-delay-ms: 1000
  backup:
    run-on-startup: ${BACKUP_RUN_ON_STARTUP:true}
    force-fresh: ${BACKUP_FORCE_FRESH:true}
    coin-prefix: ${BACKUP_COIN_PREFIX:eth}
    coin: ${BACKUP_COIN:ETH}
    intervals: ${BACKUP_INTERVALS:5m}
    start-epoch: 1778320800
    end-epoch: 1775645914
    max-iterations: 10000
    max-consecutive-missing: 500

# Nebula configuration
nebula:
  api-key: nebula-local-key
  snapshot:
    interval-ms: 500       # Snapshot interval in milliseconds (500 = 2 per second)
    log-each-tick: false   # Set to true to log each snapshot tick
  retention:
    days: 31
    cleanup-cron: "0 0 10 * * *"
    cleanup-zone: "Asia/Kolkata"
    vacuum: true
    vacuum-full: false

logging:
  level:
    com.nebula: DEBUG
    com.nebula.ingestion.client: DEBUG
    com.nebula.ingestion.service: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
